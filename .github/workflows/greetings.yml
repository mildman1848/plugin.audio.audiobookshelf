name: Greetings

on: [pull_request_target, issues]

permissions:
  contents: read

jobs:
  greeting:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          issue-message: "Thanks for opening your first issue in plugin.audio.audiobookshelf. Please make sure the correct template is filled out."
          pr-message: "Thanks for your first pull request. Please ensure the PR template and local validation steps are completed."
          repo-token: ${{ secrets.GITHUB_TOKEN }}
